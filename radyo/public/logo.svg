<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- antenna -->
  <line x1="330" y1="158" x2="358" y2="112" stroke="#f5f5f5" stroke-width="13" stroke-linecap="round"/>
  <circle cx="358" cy="112" r="9" fill="#ef4444"/>

  <!-- broadcast waves, arcing away from antenna tip -->
  <path d="M376 134 A46 46 0 0 1 392 168" fill="none" stroke="#ef4444" stroke-width="11" stroke-linecap="round"/>
  <path d="M392 110 A82 82 0 0 1 416 168" fill="none" stroke="#ef4444" stroke-width="11" stroke-linecap="round" opacity="0.5"/>

  <!-- radio body -->
  <rect x="118" y="186" width="276" height="184" rx="26" fill="none" stroke="#f5f5f5" stroke-width="14"/>

  <!-- left dial -->
  <circle cx="180" cy="278" r="34" fill="none" stroke="#f5f5f5" stroke-width="12"/>
  <circle cx="180" cy="278" r="9" fill="#ef4444"/>

  <!-- speaker grille (right) -->
  <line x1="246" y1="248" x2="358" y2="248" stroke="#f5f5f5" stroke-width="11" stroke-linecap="round"/>
  <line x1="246" y1="278" x2="358" y2="278" stroke="#f5f5f5" stroke-width="11" stroke-linecap="round"/>
  <line x1="246" y1="308" x2="358" y2="308" stroke="#f5f5f5" stroke-width="11" stroke-linecap="round"/>
</svg>
