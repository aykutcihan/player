name: EPG update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Hazirlik
        run: |
          if not exist cache mkdir cache
          if exist src\__pycache__ rd /s /q src\__pycache__
          if exist src\adapters\__pycache__ rd /s /q src\adapters\__pycache__

      - name: Token yenile
        run: python src/refresh_tokens.py

      - name: YouTube stream guncelle
        run: python src/refresh_youtube.py

      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: epg-data reposuna push
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo https://x-access-token:%EPG_DATA_TOKEN%@github.com > %USERPROFILE%\.git-credentials
          if not exist _epg_data (
            git clone https://github.com/aykutcihan/epg-data.git _epg_data
          )
          cd _epg_data
          git remote set-url origin https://github.com/aykutcihan/epg-data.git
          git pull origin master
          cd ..
          if exist epg.xml copy /Y epg.xml _epg_data\epg.xml
          if exist playlist.m3u copy /Y playlist.m3u _epg_data\playlist.m3u
          if exist films.m3u copy /Y films.m3u _epg_data\films.m3u
          if exist cache\films_db.json (
            if not exist _epg_data\cache mkdir _epg_data\cache
            copy /Y cache\films_db.json _epg_data\cache\films_db.json
          )
          if exist epg (
            robocopy epg _epg_data\epg /MIR /NFL /NDL /NJH /NJS
          )
          cd _epg_data
          git add -A
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "EPG guncellendi"
            git push origin master
          ) else (
            echo Degisiklik yok.
          )
          cd ..

      - name: playlist.m3u yerel commitle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/aykutcihan/epg-generator.git
          git add playlist.m3u
          if exist cache\tmdb.json git add cache\tmdb.json
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Automated EPG update"
            git pull --rebase -X ours origin master
            git push
          ) else (
            echo Degisiklik yok.
          )
