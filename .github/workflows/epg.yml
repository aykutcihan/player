name: EPG update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Hazırlık
        run: mkdir -p cache

      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: Değiştiyse commit'le
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          [ -f epg.xml ]          && git add epg.xml
          [ -f cache/tmdb.json ]  && git add cache/tmdb.json

          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Automated EPG update ($(date -u +%FT%TZ))"
            git pull --rebase origin master
            git push
          fi
