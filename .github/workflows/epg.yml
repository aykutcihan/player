name: EPG update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Hazirlik
        run: |
          if not exist cache mkdir cache
          if exist src\__pycache__ rd /s /q src\__pycache__
          if exist src\adapters\__pycache__ rd /s /q src\adapters\__pycache__

      - name: Token yenile
        run: python src/refresh_tokens.py

      - name: YouTube stream guncelle
        run: python src/refresh_youtube.py

      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: epg-data reposuna push
        shell: powershell
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          $REPO_URL = "https://x-access-token:$env:EPG_DATA_TOKEN@github.com/aykutcihan/epg-data.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path "_epg_data") { Remove-Item -Recurse -Force "_epg_data" }
          git clone $REPO_URL _epg_data
          if (Test-Path "epg.xml")      { Copy-Item "epg.xml"      "_epg_data/epg.xml"      -Force }
          if (Test-Path "playlist.m3u") { Copy-Item "playlist.m3u" "_epg_data/playlist.m3u" -Force }
          if (Test-Path "films.m3u")    { Copy-Item "films.m3u"    "_epg_data/films.m3u"    -Force }
          if (Test-Path "epg") {
            if (-not (Test-Path "_epg_data/epg")) { New-Item -ItemType Directory "_epg_data/epg" }
            Copy-Item "epg/*" "_epg_data/epg/" -Recurse -Force
          }
          git -C _epg_data add -A
          $exit = git -C _epg_data diff --cached --quiet; $changed = $LASTEXITCODE
          if ($changed -ne 0) {
            git -C _epg_data commit -m "EPG guncellendi"
            git -C _epg_data push origin master
            Write-Host "Push basarili"
          } else {
            Write-Host "Degisiklik yok"
          }
