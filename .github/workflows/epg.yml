name: EPG update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Hazırlık
        run: |
          if not exist cache mkdir cache
          if exist src\__pycache__ rd /s /q src\__pycache__
          if exist src\adapters\__pycache__ rd /s /q src\adapters\__pycache__

      - name: Token yenile
        run: python src/refresh_tokens.py


      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: Değiştiyse commit'le
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/aykutcihan/epg-generator.git
          if exist epg.xml git add epg.xml
          if exist cache\tmdb.json git add cache\tmdb.json
          if exist playlist.m3u git add playlist.m3u
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Automated EPG update"
            if exist .git\rebase-merge git rebase --abort
            if exist .git\rebase-apply git rebase --abort
            git pull --rebase -X theirs origin master
            git push
          ) else (
            echo Degisiklik yok, commit atlanıyor.
          )
