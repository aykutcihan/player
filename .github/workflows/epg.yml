name: EPG update

on:
  schedule:
    - cron: "0 * * * *"      # saat başı (UTC). Gecikmeler olabilir (GitHub kuyruğu).
  workflow_dispatch: {}        # elle tetikleme

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    env:
      # Node.js 20 uyarılarını bastırmak ve Node 24'e hazırlık için
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Hazırlık
        run: |
          mkdir -p cache

      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: Değiştiyse commit'le
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Dosyalar varsa ekle (128 hatasını önlemek için kontrol ekledik)
          [ -f epg.xml ] && git add epg.xml
          [ -f cache/tmdb.json ] && git add cache/tmdb.json
          
          # İçerik değişmediyse commit YOK
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Automated EPG update ($(date -u +%FT%TZ))"
            git pull --rebase origin master || echo "No rebase needed"
            git push
          fi
