name: Radyo EPG (5 dakika)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radio-epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Radyo EPG guncelle
        run: python src/refresh_radio_epg.py

      - name: Karnaval sarki bilgisi
        run: python src/karnaval_songs.py

      - name: Number1 sarki bilgisi
        run: python src/number1_songs.py

      - name: epg-data reposuna push
        shell: powershell
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          $REPO_URL = "https://x-access-token:$env:EPG_DATA_TOKEN@github.com/aykutcihan/epg-data.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path "_epg_data") { Remove-Item -Recurse -Force "_epg_data" }
          git clone $REPO_URL _epg_data
          if (Test-Path "radios.xml")            { Copy-Item "radios.xml"            "_epg_data/radios.xml" -Force }
          if (Test-Path "karnaval-songs.json")   { Copy-Item "karnaval-songs.json"   "_epg_data/karnaval-songs.json" -Force }
          if (Test-Path "number1-songs.json")    { Copy-Item "number1-songs.json"    "_epg_data/number1-songs.json" -Force }
          git -C _epg_data add -A
          $changed = git -C _epg_data diff --cached --quiet; $exit = $LASTEXITCODE
          if ($exit -ne 0) {
            git -C _epg_data commit -m "Radyo EPG guncellendi"
            git -C _epg_data push origin master
            Write-Host "Push basarili"
          } else {
            Write-Host "Degisiklik yok"
          }
