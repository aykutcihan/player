name: Radyo EPG (5 dakika)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radio-epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Radyo EPG guncelle
        run: python src/refresh_radio_epg.py

      - name: Karnaval sarki bilgisi
        run: python src/karnaval_songs.py

      - name: epg-data reposuna push
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo https://x-access-token:%EPG_DATA_TOKEN%@github.com > %USERPROFILE%\.git-credentials
          if not exist _epg_data (
            git clone https://github.com/aykutcihan/epg-data.git _epg_data
          )
          cd _epg_data
          git remote set-url origin https://github.com/aykutcihan/epg-data.git
          git pull origin master
          cd ..
          if exist radios.xml copy /Y radios.xml _epg_data\radios.xml
          if exist karnaval-songs.json copy /Y karnaval-songs.json _epg_data\karnaval-songs.json
          cd _epg_data
          git add -A
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Radyo EPG guncellendi"
            git push origin master
          ) else (
            echo Degisiklik yok.
          )
          cd ..
