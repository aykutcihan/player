name: Radyo EPG (5 dakika)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radio-epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Radyo EPG guncelle
        run: python src/refresh_radio_epg.py

      - name: Degistiyse commitle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/aykutcihan/epg-generator.git
          if exist radios.xml git add radios.xml
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Radyo EPG guncellendi"
            git pull --rebase -X theirs origin master
            git push
          ) else (
            echo Degisiklik yok.
          )
