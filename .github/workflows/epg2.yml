name: EPG update

on:
  schedule:
    - cron: "0 * * * *"      # saat başı (UTC). Gecikmeler olabilir (GitHub kuyruğu).
  workflow_dispatch: {}        # elle tetikleme

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: EPG üret
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/main.py

      - name: Değiştiyse commit'le
        run: |
          git config user.name  "epg-bot"
          git config user.email "epg-bot@users.noreply.github.com"
          git add epg.xml cache/tmdb.json
          # içerik değişmediyse commit YOK -> gereksiz commit önlenir
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "epg güncelle ($(date -u +%FT%TZ))"
            git push
          fi
