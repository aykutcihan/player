name: Stream URL yenile (gunluk)

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg-streams
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Hazirlik
        run: |
          if not exist cache mkdir cache

      - name: tvkulesi/kavuntv stream guncelle
        run: python src/refresh_tvku.py

      - name: Film listesi guncelle
        run: python src/refresh_films.py

      - name: Degistiyse commitle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/aykutcihan/epg-generator.git
          if exist playlist.m3u git add playlist.m3u
          if exist films.m3u git add films.m3u
          if exist cache\films_db.json git add cache\films_db.json
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Stream URL guncellendi"
            git pull --rebase -X theirs origin master
            git push
          ) else (
            echo Degisiklik yok.
          )
