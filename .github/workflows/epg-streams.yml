name: Stream URL yenile (gunluk)

on:
  schedule:
    - cron: "0 6,14,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: epg-streams
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Playwright tarayici
        run: playwright install chromium

      - name: Hazirlik
        run: |
          if not exist cache mkdir cache

      - name: tvkulesi/kavuntv stream guncelle
        run: python src/refresh_tvku.py

      - name: Film listesi guncelle
        run: python src/refresh_films.py

      - name: epg-generator yerel commitle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/aykutcihan/epg-generator.git
          if exist playlist.m3u git add playlist.m3u
          if exist films.m3u git add films.m3u
          if exist cache\films_db.json git add cache\films_db.json
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "Stream URL guncellendi"
            git pull --rebase -X ours origin master
            git push
          ) else (
            echo Degisiklik yok.
          )

      - name: epg-data reposuna push
        shell: powershell
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          $REPO_URL = "https://x-access-token:$env:EPG_DATA_TOKEN@github.com/aykutcihan/epg-data.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path "_epg_data") { Remove-Item -Recurse -Force "_epg_data" }
          git clone $REPO_URL _epg_data
          if (Test-Path "playlist.m3u") { Copy-Item "playlist.m3u" "_epg_data/playlist.m3u" -Force }
          if (Test-Path "films.m3u")    { Copy-Item "films.m3u"    "_epg_data/films.m3u"    -Force }
          git -C _epg_data add -A
          $exit = git -C _epg_data diff --cached --quiet; $changed = $LASTEXITCODE
          if ($changed -ne 0) {
            git -C _epg_data commit -m "Stream URL guncellendi"
            git -C _epg_data push origin master
            Write-Host "Push basarili"
          } else {
            Write-Host "Degisiklik yok"
          }
