name: Deploy App (epg-data)

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bagimliliklar
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        run: npm run build

      - name: epg-data reposuna push
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:$EPG_DATA_TOKEN@github.com/aykutcihan/tv-takip.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf _epg_ghpages
          git clone -b gh-pages "$REPO_URL" _epg_ghpages

          cp -r app/dist/. _epg_ghpages/

          git -C _epg_ghpages add -A
          git -C _epg_ghpages diff --cached --quiet || (git -C _epg_ghpages commit -m "App guncellendi" && git -C _epg_ghpages push origin gh-pages)
