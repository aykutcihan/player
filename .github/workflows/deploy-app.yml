name: Deploy App (epg-data)

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        run: |
          where node
          node --version

      - name: Bagimliliklar
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: epg-data reposuna push
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo https://x-access-token:%EPG_DATA_TOKEN%@github.com > %USERPROFILE%\.git-credentials
          if not exist _epg_data (
            git clone https://github.com/aykutcihan/epg-data.git _epg_data
          )
          cd _epg_data
          git remote set-url origin https://github.com/aykutcihan/epg-data.git
          git pull origin master
          cd ..
          robocopy app\dist _epg_data /MIR /NFL /NDL /NJH /NJS
          cd _epg_data
          git add -A
          git diff --cached --quiet
          if errorlevel 1 (
            git commit -m "App guncellendi"
            git push origin master
          ) else (
            echo Degisiklik yok.
          )
          cd ..
