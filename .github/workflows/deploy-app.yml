name: Deploy App (epg-data)

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        run: |
          where node
          node --version

      - name: Bagimliliklar
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: epg-data reposuna push
        shell: pwsh
        env:
          EPG_DATA_TOKEN: ${{ secrets.EPG_DATA_TOKEN }}
        run: |
          $REPO_URL = "https://x-access-token:$env:EPG_DATA_TOKEN@github.com/aykutcihan/epg-data.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if (-not (Test-Path "_epg_data")) {
            git clone $REPO_URL _epg_data
          } else {
            git -C _epg_data remote set-url origin $REPO_URL
            git -C _epg_data pull origin master
          }

          # Dist dosyalarini kopyala (.git hariç)
          Get-ChildItem app/dist | Copy-Item -Destination _epg_data -Recurse -Force

          git -C _epg_data add -A
          $diff = git -C _epg_data diff --cached --quiet; $changed = $LASTEXITCODE
          if ($changed -ne 0) {
            git -C _epg_data commit -m "App guncellendi"
            git -C _epg_data push origin master
            Write-Host "Push basarili"
          } else {
            Write-Host "Degisiklik yok"
          }
