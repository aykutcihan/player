<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <title>IPTV</title>
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          window.history.replaceState(null, null,
            '/' + decodeURIComponent(p[1]).replace(/&/g, '?') + window.location.hash
          );
        }
        // TV viewport scale fix
        function fixScale() {
          var W = 1920, H = 1080;
          var sw = window.screen.width || window.innerWidth;
          var sh = window.screen.height || window.innerHeight;
          var scale = Math.min(sw / W, sh / H);
          if (scale > 0 && scale < 0.99) {
            document.documentElement.style.transform = 'scale(' + scale + ')';
            document.documentElement.style.transformOrigin = 'top left';
            document.documentElement.style.width = W + 'px';
            document.documentElement.style.height = H + 'px';
          }
        }
        fixScale();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
