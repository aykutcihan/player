<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV</title>
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          window.history.replaceState(null, null,
            '/' + decodeURIComponent(p[1]).replace(/&/g, '?') + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hata yakalama - TV debug
      window.onerror = function(msg, src, line) {
        document.body.style.background = '#000';
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:red;color:white;padding:40px;font-size:32px;z-index:99999;overflow:auto;word-break:break-all';
        d.textContent = 'JS HATA: ' + msg + ' SATIR: ' + line;
        document.body.appendChild(d);
        return true;
      };
      setTimeout(function() {
        if (document.getElementById('root').children.length === 0) {
          var d = document.createElement('div');
          d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:black;padding:20px;font-size:24px;z-index:99999';
          d.textContent = 'React mount edilemedi';
          document.body.appendChild(d);
        }
      }, 5000);
    </script>
  </body>
</html>
